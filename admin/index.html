<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>FABER Admin Panel — Gestionare Banner-e</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0d1f3c 0%, #1a2f4f 100%);
      color: #1f2937;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      background: white;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .admin-logo {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .admin-logo-text {
      font-size: 28px;
      font-weight: 700;
      color: #e8642a;
      letter-spacing: 2px;
    }

    .admin-logo-subtitle {
      font-size: 12px;
      color: #6b7280;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .admin-actions {
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #1f2937;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    /* Auth Modal */
    .auth-modal {
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
    }

    .auth-modal.hidden {
      display: none;
    }

    .auth-box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .auth-box h2 {
      color: #0d1f3c;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .auth-box p {
      color: #6b7280;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .auth-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 20px;
      letter-spacing: 4px;
      text-align: center;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }

    .auth-input:focus {
      outline: none;
      border-color: #e8642a;
      box-shadow: 0 0 0 3px rgba(232, 100, 42, 0.1);
    }

    .auth-error {
      background: #fee2e2;
      color: #dc2626;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .auth-error.show {
      display: block;
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: #e8642a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .auth-btn:hover {
      background: #d55a1f;
    }

    /* Programs Grid */
    .programs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .program-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .program-card:hover {
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }

    .program-card h3 {
      color: #0d1f3c;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .program-file {
      color: #6b7280;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #f3f4f6;
      border-radius: 6px;
      word-break: break-all;
    }

    .program-status {
      margin-bottom: 16px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 8px;
      font-size: 13px;
      color: #16a34a;
    }

    .program-status.empty {
      background: #fef2f2;
      color: #dc2626;
    }

    .program-status.empty::before {
      content: "❌ ";
    }

    .program-status.ready::before {
      content: "✅ ";
    }

    .upload-group {
      margin-bottom: 20px;
    }

    .upload-input {
      display: none;
    }

    .upload-btn {
      padding: 10px 16px;
      background: #f3f4f6;
      color: #1f2937;
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      display: block;
      text-align: center;
      width: 100%;
    }

    .upload-btn:hover {
      border-color: #e8642a;
      background: #fef2f2;
    }

    .image-preview {
      max-width: 300px;
      max-height: 200px;
      border-radius: 8px;
      margin: 12px 0;
      border: 2px solid #e5e7eb;
      display: none;
    }

    .image-preview.show {
      display: block;
    }

    .publish-btn {
      width: 100%;
      padding: 10px;
      background: #e8642a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      display: none;
    }

    .publish-btn.show {
      display: block;
    }

    .publish-btn:hover {
      background: #d55a1f;
    }

    .publish-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .status-message {
      font-size: 12px;
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }

    .status-message.show {
      display: block;
    }

    .status-message.loading {
      background: #e0f2fe;
      color: #0369a1;
    }

    .status-message.success {
      background: #f0fdf4;
      color: #16a34a;
    }

    .status-message.error {
      background: #fef2f2;
      color: #dc2626;
    }

    /* GitHub Token Section */
    .github-section {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .github-section h3 {
      color: #0d1f3c;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .github-warning {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      padding: 12px 16px;
      border-radius: 6px;
      color: #92400e;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .token-form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 200px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
    }

    .form-group input:focus {
      outline: none;
      border-color: #e8642a;
      box-shadow: 0 0 0 3px rgba(232, 100, 42, 0.1);
    }

    .token-status {
      font-size: 12px;
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }

    .token-status.show {
      display: block;
    }

    .token-status.valid {
      background: #f0fdf4;
      color: #16a34a;
    }

    .token-status.invalid {
      background: #fef2f2;
      color: #dc2626;
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .programs-grid {
        grid-template-columns: 1fr;
      }

      .token-form {
        flex-direction: column;
      }

      .form-group {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Auth Modal -->
    <div class="auth-modal" id="authModal">
      <div class="auth-box">
        <h2>🔐 FABER Admin</h2>
        <p>Introdu PIN-ul pentru a continua</p>
        <div class="auth-error" id="authError"></div>
        <input type="password" id="pinInput" class="auth-input" placeholder="000000"
               maxlength="6" inputmode="numeric" autocomplete="off">
        <button class="auth-btn" onclick="verifyPin()">Accesează</button>
      </div>
    </div>

    <!-- Header -->
    <div class="admin-header">
      <div class="admin-logo">
        <div>
          <div class="admin-logo-text">FABER</div>
          <div class="admin-logo-subtitle">Admin Panel</div>
        </div>
      </div>
      <div class="admin-actions">
        <button class="btn btn-secondary" onclick="location.href='../'">← Înapoi pe site</button>
        <button class="btn btn-danger" onclick="logout()">Deconectare</button>
      </div>
    </div>

    <!-- GitHub Token Configuration -->
    <div class="github-section">
      <h3>⚙ Configurare GitHub API</h3>
      <div class="github-warning">
        ⚠ Token-ul GitHub este stocat local în browser. Nu-l partaja cu nimeni. Acesta permite upload direct pe repository.
      </div>
      <div class="token-form">
        <div class="form-group">
          <label for="githubOwner">GitHub Owner</label>
          <input type="text" id="githubOwner" placeholder="florincaciur" value="florincaciur">
        </div>
        <div class="form-group">
          <label for="githubRepo">GitHub Repository</label>
          <input type="text" id="githubRepo" placeholder="atelierdeconsultanta" value="atelierdeconsultanta">
        </div>
        <div class="form-group">
          <label for="githubToken">Personal Access Token</label>
          <input type="password" id="githubToken" placeholder="ghp_..." value="">
        </div>
      </div>
      <div class="token-status" id="tokenStatus"></div>
    </div>

    <!-- Programs Grid -->
    <div class="programs-grid" id="programsGrid"></div>
  </div>

  <script>
    // ============================================================
    // AUTH
    // ============================================================
    const CORRECT_PIN = 'FABER1';

    function verifyPin() {
      const pin = document.getElementById('pinInput').value;
      const errorEl = document.getElementById('authError');

      if (pin === CORRECT_PIN) {
        sessionStorage.setItem('fabadmin_authenticated', 'true');
        document.getElementById('authModal').classList.add('hidden');
      } else {
        errorEl.textContent = 'PIN incorect. Încearcă din nou.';
        errorEl.classList.add('show');
        document.getElementById('pinInput').value = '';
        setTimeout(() => errorEl.classList.remove('show'), 3000);
      }
    }

    function logout() {
      if (confirm('Ești sigur că vrei să te deconectezi?')) {
        sessionStorage.removeItem('fabadmin_authenticated');
        location.reload();
      }
    }

    // Check auth on page load
    function checkAuth() {
      if (sessionStorage.getItem('fabadmin_authenticated') !== 'true') {
        document.getElementById('authModal').classList.remove('hidden');
      }
    }

    // Allow Enter to verify PIN
    document.getElementById('pinInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyPin();
    });

    // ============================================================
    // PROGRAMS DATA
    // ============================================================
    const PROGRAMS = [
      {
        name: 'POR Micro Nord-Est',
        htmlFile: 'por-adr-nord-est.html',
        bannerPath: 'admin/banners/por-micro.jpg',
        bannerKey: 'por_micro'
      },
      {
        name: 'DR12 AFIR',
        htmlFile: 'dr12-afir.html',
        bannerPath: 'admin/banners/dr12.jpg',
        bannerKey: 'dr12'
      },
      {
        name: 'DR14 Ferme Mici',
        htmlFile: 'dr14.html',
        bannerPath: 'admin/banners/dr14.jpg',
        bannerKey: 'dr14'
      },
      {
        name: 'AFIR Autoconsum Agroalimentar',
        htmlFile: 'afir-autoconsum-agroalimentar.html',
        bannerPath: 'admin/banners/afir-autoconsum.jpg',
        bannerKey: 'afir_autoconsum'
      },
      {
        name: 'Autoconsum Publici',
        htmlFile: 'autoconsum-publici.html',
        bannerPath: 'admin/banners/autoconsum-publici.jpg',
        bannerKey: 'autoconsum_publici'
      },
      {
        name: 'Femeia Antreprenor',
        htmlFile: 'femeia-antreprenor-2026.html',
        bannerPath: 'admin/banners/femeia-antreprenor.jpg',
        bannerKey: 'femeia_antreprenor'
      },
      {
        name: 'PRO INFRA',
        htmlFile: 'pro-infra.html',
        bannerPath: 'admin/banners/pro-infra.jpg',
        bannerKey: 'pro_infra'
      },
      {
        name: 'Start-Up Nation',
        htmlFile: 'start-up-nation-2026.html',
        bannerPath: 'admin/banners/startup-nation.jpg',
        bannerKey: 'startup_nation'
      }
    ];

    // ============================================================
    // GITHUB UPLOAD
    // ============================================================
    async function uploadToGitHub(token, owner, repo, path, base64Content) {
      let sha = null;
      try {
        const checkRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        if (checkRes.ok) {
          const data = await checkRes.json();
          sha = data.sha;
        }
      } catch (e) {
        console.log('File does not exist yet');
      }

      const filename = path.split('/').pop();
      const body = {
        message: `Admin: Actualizare banner ${filename}`,
        content: base64Content,
        ...(sha ? { sha } : {})
      };

      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      return res.ok;
    }

    // ============================================================
    // FILE UPLOAD HANDLERS
    // ============================================================
    function handleFileSelect(programKey) {
      return async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.type.startsWith('image/')) {
          alert('Te rugăm selectează o imagine.');
          return;
        }

        const reader = new FileReader();
        reader.onload = (evt) => {
          const base64 = evt.target.result;
          const previewEl = document.getElementById(`preview-${programKey}`);
          const publishBtn = document.getElementById(`publish-${programKey}`);

          previewEl.src = base64;
          previewEl.classList.add('show');
          publishBtn.classList.add('show');
          publishBtn.dataset.base64 = base64;
          publishBtn.dataset.filename = file.name;
        };
        reader.readAsDataURL(file);
      };
    }

    function handlePublish(programKey) {
      return async () => {
        const publishBtn = document.getElementById(`publish-${programKey}`);
        const statusEl = document.getElementById(`status-${programKey}`);
        const base64 = publishBtn.dataset.base64;
        const filename = publishBtn.dataset.filename;

        const owner = document.getElementById('githubOwner').value;
        const repo = document.getElementById('githubRepo').value;
        const token = document.getElementById('githubToken').value;

        if (!token) {
          statusEl.textContent = '❌ Te rugăm configurează GitHub Token.';
          statusEl.classList.add('show', 'error');
          return;
        }

        const program = PROGRAMS.find(p => p.bannerKey === programKey);
        const path = program.bannerPath;

        publishBtn.disabled = true;
        statusEl.textContent = 'Se publică...';
        statusEl.classList.add('show', 'loading');

        try {
          const success = await uploadToGitHub(token, owner, repo, path, base64);

          if (success) {
            statusEl.textContent = '✅ Publicat cu succes! Site-ul se va actualiza în ~1 minut.';
            statusEl.classList.remove('loading', 'error');
            statusEl.classList.add('success');

            localStorage.setItem(`faber_banner_${programKey}`, base64);

            setTimeout(() => {
              publishBtn.disabled = false;
              document.getElementById(`upload-${programKey}`).value = '';
              document.getElementById(`preview-${programKey}`).classList.remove('show');
              publishBtn.classList.remove('show');
              statusEl.classList.remove('show');
            }, 3000);
          } else {
            throw new Error('Upload failed');
          }
        } catch (err) {
          publishBtn.disabled = false;
          statusEl.textContent = `❌ Eroare: ${err.message || 'Upload failed'}`;
          statusEl.classList.remove('loading', 'success');
          statusEl.classList.add('error');
        }
      };
    }

    // ============================================================
    // RENDER PROGRAMS GRID
    // ============================================================
    function renderPrograms() {
      const grid = document.getElementById('programsGrid');
      grid.innerHTML = PROGRAMS.map(program => `
        <div class="program-card">
          <h3>${program.name}</h3>
          <div class="program-file">${program.htmlFile}</div>

          <div class="program-status ${localStorage.getItem(`faber_banner_${program.bannerKey}`) ? 'ready' : 'empty'}">
            ${localStorage.getItem(`faber_banner_${program.bannerKey}`) ? 'Banner încărcat local' : 'Niciun banner încărcat'}
          </div>

          <div class="upload-group">
            <label class="upload-btn" for="upload-${program.bannerKey}">
              📁 Selectează imagine
            </label>
            <input type="file" id="upload-${program.bannerKey}"
                   class="upload-input" accept="image/*"
                   onchange="handleFileSelect('${program.bannerKey}')()">

            <img id="preview-${program.bannerKey}" class="image-preview" alt="Preview">

            <button class="publish-btn" id="publish-${program.bannerKey}"
                    onclick="handlePublish('${program.bannerKey}')()">
              🚀 Publică pe site
            </button>

            <div class="status-message" id="status-${program.bannerKey}"></div>
          </div>
        </div>
      `).join('');
    }

    // ============================================================
    // GITHUB TOKEN VALIDATION
    // ============================================================
    document.getElementById('githubToken').addEventListener('change', async () => {
      const token = document.getElementById('githubToken').value;
      const owner = document.getElementById('githubOwner').value;
      const repo = document.getElementById('githubRepo').value;
      const statusEl = document.getElementById('tokenStatus');

      if (!token) {
        statusEl.classList.remove('show');
        return;
      }

      try {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (res.ok) {
          statusEl.textContent = '✅ Token valid și repository accesibil.';
          statusEl.classList.add('show', 'valid');
          statusEl.classList.remove('invalid');
          localStorage.setItem('faber_github_token', token);
        } else {
          throw new Error('Invalid token or repository');
        }
      } catch (err) {
        statusEl.textContent = '❌ Token invalid sau repository inaccesibil.';
        statusEl.classList.add('show', 'invalid');
        statusEl.classList.remove('valid');
        localStorage.removeItem('faber_github_token');
      }
    });

    // Load saved token on init
    window.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      renderPrograms();

      const savedToken = localStorage.getItem('faber_github_token');
      if (savedToken) {
        document.getElementById('githubToken').value = savedToken;
      }
    });
  </script>
</body>
</html>
